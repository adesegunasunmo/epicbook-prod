---
- name: Prepare system
  hosts: web
  become: true
  roles:
    - common

- name: Install MySQL
  hosts: web
  become: true
  roles:
    - mysql

- name: Install and configure Nginx
  hosts: web
  become: true
  roles:
    - nginx

- name: Deploy EpicBook App
  hosts: web
  become: true
  roles:
    - epicbook