---
- name: Update apt
  apt:
    update_cache: yes

- name: Install base packages
  apt:
    name:
      - git
      - curl
      - unzip
      - software-properties-common
    state: present

- name: Install Node.js
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node

- name: Install PM2 globally
  npm:
    name: pm2
    global: yes